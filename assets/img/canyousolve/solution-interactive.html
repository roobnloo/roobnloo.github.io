<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <script src="https://cdn.jsdelivr.net/npm/plotly.js@3.0.1/dist/plotly.min.js"
    integrity="sha256-oy6Be7Eh6eiQFs5M7oXuPxxm9qbJXEtTpfSI93dW16Q=" crossorigin="anonymous"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #chart {
      width: 100%;
      height: 410px;
    }

    .controls {
      display: flex;
      gap: 2rem;
      padding: 0.5rem 1rem 1rem;
      flex-wrap: wrap;
    }

    .control {
      flex: 1 1 260px;
      min-width: 220px;
    }

    .control label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
    }

    .control input[type="range"] {
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="chart"></div>
  <div class="controls">
    <div class="control">
      <label for="gamma-slider">&gamma; = <span id="gamma-value">0.50</span></label>
      <input type="range" id="gamma-slider" min="0" max="1" step="0.01" value="0.5" />
    </div>
    <div class="control">
      <label for="eta-slider">&eta; = <span id="eta-value">9.0</span></label>
      <input type="range" id="eta-slider" min="0" max="20" step="0.1" value="9" />
    </div>
  </div>
  <script>
    // f(z) = E(X | X+Y = z) for the two-component Gaussian-mixture-noise
    // model; see _posts/2026-07-10-canyousolve.md for the derivation.
    // Var(Z | W=0) = 2 always (X ~ N(0,1), Y|W=0 ~ N(0,1)); Var(Z|W=1) = 1+eta.
    function normalPdf(z, variance) {
      return Math.exp(-(z * z) / (2 * variance)) / Math.sqrt(2 * Math.PI * variance);
    }

    function fParam(zArr, gamma, eta) {
      return zArr.map(function (z) {
        var fzm0 = normalPdf(z, 2);
        var fzm1 = normalPdf(z, 1 + eta);
        var denom = (1 - gamma) * fzm0 + gamma * fzm1;
        return (z / 2) * ((1 - gamma) * fzm0) / denom + (z / (1 + eta)) * (gamma * fzm1) / denom;
      });
    }

    function lmmseParam(zArr, gamma, eta) {
      return zArr.map(function (z) {
        return z / (2 + (eta - 1) * gamma);
      });
    }

    var zGrid = [];
    var N = 300;
    for (var i = 0; i < N; i++) {
      zGrid.push(-8 + (16 * i) / (N - 1));
    }

    var gammaDefault = 0.5;
    var etaDefault = 9;

    var traceF = {
      x: zGrid,
      y: fParam(zGrid, gammaDefault, etaDefault),
      type: "scatter",
      mode: "lines",
      name: "f(z)",
      line: { color: "#2166ac", width: 3 },
      hovertemplate: "z = %{x:.2f}<br>f(z) = %{y:.2f}<extra></extra>",
    };
    var traceLmmse = {
      x: zGrid,
      y: lmmseParam(zGrid, gammaDefault, etaDefault),
      type: "scatter",
      mode: "lines",
      name: "LMMSE",
      line: { color: "#d6604d", width: 2, dash: "dash" },
      hovertemplate: "z = %{x:.2f}<br>LMMSE = %{y:.2f}<extra></extra>",
    };

    var layout = {
      xaxis: { title: { text: "z" }, fixedrange: true },
      yaxis: { title: "", range: [-2.5, 2.5], autorange: false, fixedrange: true },
      margin: { t: 20, r: 10, b: 50, l: 60 },
      legend: { x: 0.02, y: 0.98 },
    };

    var chartEl = document.getElementById("chart");
    Plotly.newPlot(chartEl, [traceF, traceLmmse], layout, {
      responsive: true,
      displayModeBar: false,
      scrollZoom: false,
      doubleClick: false,
    });

    var gammaSlider = document.getElementById("gamma-slider");
    var etaSlider = document.getElementById("eta-slider");
    var gammaValueLabel = document.getElementById("gamma-value");
    var etaValueLabel = document.getElementById("eta-value");

    function update() {
      var gamma = parseFloat(gammaSlider.value);
      var eta = parseFloat(etaSlider.value);
      gammaValueLabel.textContent = gamma.toFixed(2);
      etaValueLabel.textContent = eta.toFixed(1);
      Plotly.restyle(
        chartEl,
        { y: [fParam(zGrid, gamma, eta), lmmseParam(zGrid, gamma, eta)] },
        [0, 1]
      );
    }

    gammaSlider.addEventListener("input", update);
    etaSlider.addEventListener("input", update);
  </script>
</body>

</html>
